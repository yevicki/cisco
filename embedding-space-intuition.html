<div class="page-container">
  <div id="canvas-wrap">
    <canvas id="c" height="320"></canvas>
  </div>
  <div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>HR / leave policies</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Misconduct / reporting</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>IT / technical</div>
  <div class="legend-item"><div class="legend-dot" style="background:#D4537E"></div>Your query</div>
</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.offsetWidth || 680;
canvas.width = W * devicePixelRatio;
canvas.height = 320 * devicePixelRatio;
ctx.scale(devicePixelRatio, devicePixelRatio);
const w = W, h = 320;

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const textColor = isDark ? 'rgba(200,198,190,0.9)' : 'rgba(40,40,38,0.85)';
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
const bgColor = isDark ? '#1e1e1c' : '#f7f6f2';

const points = [
  { label: 'Parental leave policy', x: 0.18, y: 0.22, color: '#378ADD', r: 6 },
  { label: 'Maternity benefit guide', x: 0.24, y: 0.30, color: '#378ADD', r: 6 },
  { label: 'Paternity leave FAQ', x: 0.14, y: 0.35, color: '#378ADD', r: 6 },
  { label: 'Family leave eligibility', x: 0.22, y: 0.18, color: '#378ADD', r: 6 },
  { label: 'Report harassment', x: 0.65, y: 0.25, color: '#1D9E75', r: 6 },
  { label: 'Misconduct complaint process', x: 0.72, y: 0.32, color: '#1D9E75', r: 6 },
  { label: 'Ethics hotline', x: 0.68, y: 0.20, color: '#1D9E75', r: 6 },
  { label: 'Firewall config', x: 0.72, y: 0.78, color: '#BA7517', r: 6 },
  { label: 'VPN setup guide', x: 0.80, y: 0.72, color: '#BA7517', r: 6 },
  { label: 'Network security policy', x: 0.76, y: 0.84, color: '#BA7517', r: 6 },
  { label: '"Time off for new baby?"', x: 0.20, y: 0.27, color: '#D4537E', r: 9, query: true },
];

function px(pt) { return { x: pt.x * w, y: pt.y * h }; }

function draw() {
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = bgColor;
  ctx.roundRect(0, 0, w, h, 12);
  ctx.fill();

  for (let gx = 0; gx < w; gx += 48) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h);
    ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5; ctx.stroke();
  }
  for (let gy = 0; gy < h; gy += 48) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy);
    ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5; ctx.stroke();
  }

  const query = points.find(p => p.query);
  const qp = px(query);

  points.filter(p => !p.query).forEach(pt => {
    const pp = px(pt);
    const isClose = pt.color === '#378ADD';
    ctx.beginPath();
    ctx.moveTo(qp.x, qp.y); ctx.lineTo(pp.x, pp.y);
    ctx.strokeStyle = isClose ? 'rgba(212,83,126,0.35)' : 'rgba(150,148,140,0.1)';
    ctx.lineWidth = isClose ? 1.5 : 0.5;
    ctx.setLineDash(isClose ? [4, 3] : [2, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  points.forEach(pt => {
    const pp = px(pt);
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, pt.r, 0, Math.PI * 2);
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = pt.query ? 1 : 0.75;
    ctx.fill();
    ctx.globalAlpha = 1;
    if (pt.query) {
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, pt.r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = '#D4537E';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.35;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    const isLeft = pt.x > 0.55;
    const labelX = isLeft ? pp.x - pt.r - 4 : pp.x + pt.r + 4;
    const anchor = isLeft ? 'right' : 'left';
    ctx.font = pt.query ? '500 12px sans-serif' : '12px sans-serif';
    ctx.fillStyle = pt.query ? '#D4537E' : textColor;
    ctx.textAlign = anchor;
    ctx.textBaseline = 'middle';
    ctx.fillText(pt.label, labelX, pp.y);
  });

  ctx.font = '11px sans-serif';
  ctx.fillStyle = isDark ? 'rgba(180,178,169,0.5)' : 'rgba(100,98,90,0.5)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('← semantic space (simplified to 2D) →', 12, 8);

  const closeGroup = points.filter(p => p.color === '#378ADD' && !p.query);
  const qpx = qp.x, qpy = qp.y;
  let cx = 0, cy = 0;
  closeGroup.forEach(p => { const pp = px(p); cx += pp.x; cy += pp.y; });
  cx /= closeGroup.length; cy /= closeGroup.length;
  const rad = 58;
  ctx.beginPath();
  ctx.arc(cx, cy, rad, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(55,138,221,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(55,138,221,0.06)';
  ctx.fill();

  ctx.font = '500 11px sans-serif';
  ctx.fillStyle = 'rgba(55,138,221,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText('closest matches', cx, cy + rad + 14);
}

draw();
</script>
